          type: integer
    Social:
      description: Social data for a Customer
      type: object
      properties:
        facebookID:
          description: Facebook ID
          maxLength: 100
          minLength: 0
          type: string
        facebookNumberOfFriends:
          format: int32
          description: Number of Facebook friends
          type: integer
        instagramID:
          description: Instagram ID
          maxLength: 100
          minLength: 0
          type: string
        instagramNumberOfFollowers:
          format: int32
          description: Number of Instagram followers
          type: integer
        twitterID:
          description: Twitter ID
          maxLength: 100
          minLength: 0
          type: string
        twitterNumberOfFollowers:
          format: int32
          description: Number of Twitter followers
          type: integer
    ResourceCreated:
      type: object
      properties:
        status:
          format: int32
          description: HTTP status code.
          type: integer
        resourceId:
          description: An identifier used to locate a resource.
          type: string
    Error:
      type: object
      properties:
        status:
          format: int32
          description: HTTP status code.
          type: integer
        error:
          description: Error code indicating what error has occured.
          type: string
        message:
          description: Message describing the status and the error that occurred.
          type: string
    Order:
      description: An order resource
      required:
      - orderNumber
      type: object
      properties:
        associateID:
          description: Associate ID of order
          type: string
        billingAddress:
          $ref: '#/definitions/BillingAddress'
          description: Billing address of order
        couponCode:
          description: Coupon code used with order
          maxLength: 32
          minLength: 0
          type: string
        customer:
          $ref: '#/definitions/Customer'
          description: Customer of order
        customerNumber:
          description: Internal customer number
          maxLength: 20
          minLength: 0
          type: string
        dateEntered:
          format: date-time
          description: Timestamp of order date (ET)
          type: string
        discountTotal:
          format: double
          description: DEPRECATED as of March 2022
          type: number
        email:
          description: Email address of customer. This property is required for accounts
            that are not CRM enabled.
          maxLength: 100
          minLength: 0
          type: string
        handlingTotal:
          format: double
          description: Total handling costs
          type: number
        items:
          description: Order items
          type: array
          items:
            $ref: '#/definitions/OrderItem'
        itemTotal:
          format: double
          description: Total cost of items ordered (subtotal)
          type: number
        merchandiseDiscount:
          format: double
          description: Discount applied to the merchandise of the order
          type: number
        merchandiseDiscountDescription:
          description: Description of the discount applied to the merchandise of the
            order
          type: string
        merchandiseDiscountType:
          description: Type of discount applied to the merchandise of the order
          enum:
          - NotSet
          - PriceOverride
          - PriceRule
          - Promotion
          - SeniorCitizen
          - Markdown
          - Coupon
          - QuantityDiscount
          - Rebate
          - CashDiscount
          - TradeDiscount
          - TradeInKind
          - PromptPaymentDiscount
          - GeneralDiscount
          - GiftVoucher
          - FlexibleDiscount
          - RewardProgram
          - ManufacturerReward
          - CreditCardReward
          type: string
        meta1:
          description: Additional meta information
          maxLength: 500
          minLength: 0
          type: string
        meta2:
          description: Additional meta information
          maxLength: 500
          minLength: 0
          type: string
        meta3:
          description: Additional meta information
          maxLength: 500
          minLength: 0
          type: string
        meta4:
          description: Additional meta information
          maxLength: 500
          minLength: 0
          type: string
        meta5:
          description: Additional meta information
          maxLength: 500
          minLength: 0
          type: string
        nonMerchandiseDiscount:
          format: double
          description: Discounts applied to the order that is not related to the merchandise
          type: number
        nonMerchandiseDiscountDescription:
          description: Description of the discount applied to the order not related
            to the merchandise
          type: string
        nonMerchandiseDiscountType:
          description: Type of discount applied to the order not related to the merchandise
          enum:
          - NotSet
          - PriceOverride
          - PriceRule
          - Promotion
          - SeniorCitizen
          - Markdown
          - Coupon
          - QuantityDiscount
          - Rebate
          - CashDiscount
          - TradeDiscount
          - TradeInKind
          - PromptPaymentDiscount
          - GeneralDiscount
          - GiftVoucher
          - FlexibleDiscount
          - RewardProgram
          - ManufacturerReward
          - CreditCardReward
          type: string
        orderNumber:
          description: Unique order number
          maxLength: 50
          minLength: 0
          type: string
        orderTotal:
          format: double
          description: Total value of order
          type: number
        shipDate:
          format: date-time
          description: Timestamp when entire order shipped (ET)
          type: string
        shippingAddress:
          $ref: '#/definitions/ShippingAddress'
          description: Shipping address of order
        shippingMethod:
          description: Shipping method (e.g. UPS Ground)
          maxLength: 32
          minLength: 0
          type: string
        shippingTotal:
          format: double
          description: Total shipping costs
          type: number
        source:
          description: Describes the source at which the order was placed (online,
            POS, etc.)
          maxLength: 25
          minLength: 0
          type: string
        status:
          description: Status indicator
          enum:
          - NotSet
          - Misc
          - PreOrder
          - BackOrder
          - Pending
          - Hold
          - Processing
          - Shipped
          - Completed
          - Returned
          - Canceled
          - Unknown
          - Closed
          type: string
        storeNumber:
          description: Brick and mortar store location
          maxLength: 100
          minLength: 0
          type: string
        taxTotal:
          format: double
          description: Total sales tax charged
          type: number
        trackingNumber:
          description: Shipment tracking number
          maxLength: 32
          minLength: 0
          type: string
    BillingAddress:
