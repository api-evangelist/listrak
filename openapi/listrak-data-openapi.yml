      type: object
      properties:
        firstName:
          description: First name
          type: string
        lastName:
          description: Last name
          type: string
        mobilePhone:
          description: Mobile phone number
          type: string
        phone:
          description: Phone number
          type: string
        zipCode:
          description: Home address ZIP Code
          type: string
        address1:
          description: Home address line 1
          maxLength: 100
          minLength: 0
          type: string
        address2:
          description: Home address line 2
          maxLength: 100
          minLength: 0
          type: string
        address3:
          description: Home address line 3
          maxLength: 100
          minLength: 0
          type: string
        city:
          description: Home address city
          maxLength: 100
          minLength: 0
          type: string
        country:
          description: Home address country
          maxLength: 100
          minLength: 0
          type: string
        state:
          description: Home address state
          maxLength: 100
          minLength: 0
          type: string
    OrderItem:
      description: An order resource
      required:
      - orderNumber
      - sku
      type: object
      properties:
        discountDescription:
          description: Description of the discount for the line item
          type: string
        discountType:
          description: Type of discount for the line item
          enum:
          - NotSet
          - PriceOverride
          - PriceRule
          - Promotion
          - SeniorCitizen
          - Markdown
          - Coupon
          - QuantityDiscount
          - Rebate
          - CashDiscount
          - TradeDiscount
          - TradeInKind
          - PromptPaymentDiscount
          - GeneralDiscount
          - GiftVoucher
          - FlexibleDiscount
          - RewardProgram
          - ManufacturerReward
          - CreditCardReward
          type: string
        discountedPrice:
          format: double
          description: Total discounted cost of product
          type: number
        itemTotal:
          format: double
          description: Total line item cost (quantity times price)
          type: number
        itemDiscountTotal:
          format: double
          description: Total amount of the discount for the line item
          type: number
        meta1:
          description: Additional Optional Information
          maxLength: 500
          minLength: 0
          type: string
        meta2:
          description: Additional Optional Information
          maxLength: 500
          minLength: 0
          type: string
        meta3:
          description: Additional Optional Information
          maxLength: 500
          minLength: 0
          type: string
        meta4:
          description: Additional Optional Information
          maxLength: 500
          minLength: 0
          type: string
        meta5:
          description: Additional Optional Information
          maxLength: 500
          minLength: 0
          type: string
        orderNumber:
          description: Order number
          maxLength: 50
          minLength: 0
          type: string
        price:
          format: double
          description: Price of one unit purchased
          type: number
        quantity:
          format: int32
          description: Total number of units purchased
          type: integer
        shipDate:
          format: date-time
          description: Timestamp when item shipped (ET)
          type: string
        shippingMethod:
          description: Shipping method (e.g. UPS Ground)
          maxLength: 32
          minLength: 0
          type: string
        sku:
          description: Unique stock number of product
          maxLength: 100
          minLength: 0
          type: string
        status:
          description: Status indicator
          enum:
          - NotSet
          - Misc
          - PreOrder
          - BackOrder
          - Pending
          - Hold
          - Processing
          - Shipped
          - Completed
          - Returned
          - Canceled
          - Unknown
          - Closed
          type: string
        trackingNumber:
          description: Shipment tracking number
          maxLength: 32
          minLength: 0
          type: string
    ShippingAddress:
      description: Shipping address of order
      type: object
      properties:
        firstName:
          description: First name
          maxLength: 50
          minLength: 0
          type: string
        lastName:
          description: Last name
          maxLength: 50
          minLength: 0
          type: string
        phone:
          description: Phone number
          type: string
        zipCode:
          description: Home address ZIP Code
          type: string
        address1:
          description: Home address line 1
          maxLength: 100
          minLength: 0
          type: string
        address2:
          description: Home address line 2
          maxLength: 100
          minLength: 0
          type: string
        address3:
          description: Home address line 3
          maxLength: 100
          minLength: 0
          type: string
        city:
          description: Home address city
          maxLength: 100
          minLength: 0
          type: string
        country:
          description: Home address country
          maxLength: 100
          minLength: 0
          type: string
        state:
          description: Home address state
          maxLength: 100
          minLength: 0
          type: string
    Product:
      description: A product resource
      required:
      - sku
      type: object
      properties:
        alternateImagesType1:
          description: Alternate product images
          type: array
          items:
            $ref: '#/definitions/AlternateImage'
        alternateImagesType2:
          description: Alternate product images
          type: array
          items:
            $ref: '#/definitions/AlternateImage'
        alternateImagesType3:
          description: Alternate product images
          type: array
          items:
            $ref: '#/definitions/AlternateImage'
        brand:
          description: Brand name of product
          maxLength: 50
          minLength: 0
          type: string
        category:
          description: Category or department
          maxLength: 50
          minLength: 0
          type: string
        color:
          description: Color of product (e.g. green, paisley, etc.)
          maxLength: 100
          minLength: 0
          type: string
        description:
          description: Description of product
          maxLength: 4000
          minLength: 0
          type: string
